# ============================================================
# Docker Compose — Local Development Environment
# ============================================================
# Usage: Copy to project root, then run:
#   docker compose up        — start all services
#   docker compose up -d     — start in background
#   docker compose down      — stop all services
#   docker compose logs -f   — tail logs
#
# Services:
#   - app: Remix app (hot-reload in dev)
#   - db:  PostgreSQL (Phase 2+ only, skip for SQLite)
#   - redis: Redis (Phase 3+ only, skip for DB-queue)
#
# Note: For Phase 1 (SQLite), you only need the app service.
#       Uncomment db/redis when scaling.
# ============================================================

services:
  # --- Remix App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build  # Use build stage for dev (has devDeps)
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot-reload (dev only)
      - .:/app
      - /app/node_modules  # Don't override container's node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Phase 1: SQLite (default — no external DB needed)
      - DATABASE_URL=file:./dev.db
      # Phase 2: Uncomment for PostgreSQL
      # - DATABASE_URL=postgresql://postgres:postgres@db:5432/shopify_app?schema=public
      # Phase 3: Uncomment for Redis
      # - REDIS_URL=redis://redis:6379
    command: npm run dev
    # depends_on:
    #   db:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy

