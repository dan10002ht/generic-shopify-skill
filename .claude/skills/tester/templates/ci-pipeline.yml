# ============================================================
# GitHub Actions CI Pipeline — Shopify App
# ============================================================
# Triggers: push to main, pull requests
# Jobs: lint, typecheck, test (unit + E2E), build, bundle size check
#
# Usage: Copy to .github/workflows/ci.yml in your project
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ----------------------------------------------------------
  # Lint + TypeCheck — fast feedback
  # ----------------------------------------------------------
  quality:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ----------------------------------------------------------
  # Unit & Integration Tests
  # ----------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./test.db"

      - name: Run tests with coverage
        run: npm run test -- --coverage --reporter=verbose
        env:
          DATABASE_URL: "file:./test.db"

      # Upload coverage report as artifact
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ----------------------------------------------------------
  # E2E Tests (Playwright) — only on PRs to main
  # ----------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: "file:./test.db"

      - name: Run E2E tests
        run: npx playwright test
        env:
          DATABASE_URL: "file:./test.db"

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ----------------------------------------------------------
  # Build — verify production build succeeds
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Production build
        run: npm run build

      # Check build output size
      - name: Check bundle size
        run: |
          echo "## Build Output Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh build/ 2>/dev/null || echo "No build/ directory"
          du -sh public/build/ 2>/dev/null || echo "No public/build/ directory"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------
  # Storefront Bundle Size Check
  # ----------------------------------------------------------
  bundle-check:
    name: Storefront Bundle Size
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      # Build storefront extensions
      - name: Build extensions
        run: |
          if [ -d "extensions/src" ]; then
            npx vite build extensions/src --outDir extensions/theme-app-extension/assets
          fi

      # Check gzipped size against 15KB budget
      - name: Check storefront bundle size
        run: |
          echo "## Storefront Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "| File | Raw | Gzipped | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|---------|--------|" >> $GITHUB_STEP_SUMMARY

          OVER_BUDGET=false
          for file in extensions/theme-app-extension/assets/*.js; do
            if [ -f "$file" ]; then
              RAW=$(wc -c < "$file" | tr -d ' ')
              GZIPPED=$(gzip -c "$file" | wc -c | tr -d ' ')
              RAW_KB=$(echo "scale=1; $RAW/1024" | bc)
              GZ_KB=$(echo "scale=1; $GZIPPED/1024" | bc)
              FILENAME=$(basename "$file")

              if [ "$GZIPPED" -gt 15360 ]; then
                STATUS="❌ Over 15KB budget"
                OVER_BUDGET=true
              elif [ "$GZIPPED" -gt 10240 ]; then
                STATUS="⚠️ Warning (>10KB)"
              else
                STATUS="✅ OK"
              fi

              echo "| $FILENAME | ${RAW_KB}KB | ${GZ_KB}KB | $STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ "$OVER_BUDGET" = true ]; then
            echo "::error::Storefront bundle exceeds 15KB gzipped budget!"
            exit 1
          fi
